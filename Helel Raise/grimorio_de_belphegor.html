// ====== NG+ INHERITED OBJECTS ENGINE ======
// Carries certain items across playthroughs
const InheritedObjects = (() => {
  const inheritableItems = {
    '🪞 Fragmento de espejo': { minRuns: 2, requiredEnding: 'final_bueno_espejo' },
    '📕 Libro de Supervivencia': { minRuns: 2, requiredEnding: null },
    '✨ Nombre verdadero': { minRuns: 3, requiredEnding: null },
    '🛡️ Protección espectral': { minRuns: 3, requiredEnding: null },
    '👁️‍🗨️ Ojo de Belphegor': { minRuns: 4, requiredEnding: 'final_bueno' },
  };

  function getInheritedItems() {
    if (!Persistence.isNewGamePlus()) return [];
    const d = Persistence.get();
    const run = d.playthroughs;
    const items = [];

    Object.entries(inheritableItems).forEach(([item, req]) => {
      if (run < req.minRuns) return;
      if (req.requiredEnding && !d.endings[req.requiredEnding]) return;
      if (d.allItems.includes(item)) {
        items.push(item);
      }
    });

    return items;
  }

  // Inject inherited items at game start
  function applyInheritance() {
    const items = getInheritedItems();
    if (items.length === 0) return;

    items.forEach(item => {
      addItem(item);
    });

    // Set corresponding flags
    if (state.inventory.includes('✨ Nombre verdadero')) state.flags.trueName = true;
    if (state.inventory.includes('📕 Libro de Supervivencia')) state.flags.survivalBook = true;
    if (state.inventory.includes('🪞 Fragmento de espejo')) state.flags.mirrorFree = true;

    return items;
  }

  // Get NG+ intro text for inherited items
  function getInheritanceText(items) {
    if (!items || items.length === 0) return '';
    let text = '<br><br><span class="gold">Algo pesa en tus bolsillos. Objetos que no recuerdas haber tomado... pero que reconoces.</span><br>';
    items.forEach(item => {
      text += `<br><span class="whisper">• ${item} — sobrevivió al ciclo anterior</span>`;
    });
    text += '<br><br><span class="highlight">"Interesante. Vienes armado esta vez. Eso lo hace más... estimulante."</span>';
    return text;
  }

  return { getInheritedItems, applyInheritance, getInheritanceText };
})();

// ====== CURSED GUIDE ENGINE (Run 7+) ======
// DemonWhispers become a "guide" revealing paths to unseen endings
const CursedGuide = (() => {
  function isActive() {
    try { return Persistence.getPlaythroughs() >= 7; } catch(e) { return false; }
  }

  function getUnseenEndings() {
    const allEndings = ['final_bueno','final_bueno_espejo','final_bueno_fuego','final_malo',
      'final_secreto','final_guardian','final_pacto','final_escape','final_voluntad'];
    const seen = Persistence.getEndingsFound();
    return allEndings.filter(e => !seen.includes(e));
  }

  const endingHints = {
    'final_bueno': [
      'escapa... simplemente... escapa... rechaza su trato y sal...',
      'no necesitas pelear... sólo irte... la puerta está ahí...',
    ],
    'final_bueno_espejo': [
      'el espejo... busca el espejo roto... atrápalo en cristal...',
      'los espejos son puertas... y también jaulas...',
    ],
    'final_bueno_fuego': [
      'quémalo... quema el libro... el fuego purifica...',
      'cierra el grimorio... luego deja que arda...',
    ],
    'final_malo': [
      'ríndete... deja que te consuma... es más fácil...',
      'acepta su oferta... di que sí... a todo...',
    ],
    'final_secreto': [
      'el nombre... al revés... destruye el último vínculo...',
      'ROGEHPLEB... pero en el momento justo... no antes...',
      'destruye el ojo de cristal... no lo tomes...',
    ],
    'final_guardian': [
      'el hechizo de sellado... el contra-hechizo... el precio es quedarse...',
      'sella al demonio... pero nunca saldrás...',
    ],
    'final_pacto': [
      'negocia con él... pide conocimiento... el favor vendrá después...',
      'atrápalo primero... luego negocia desde una posición de fuerza...',
    ],
    'final_escape': [
      'corre... sin preparación... sin armas... sólo corre...',
      'la ventana rota... tu sangre en el marco... la huida cobarde...',
    ],
    'final_voluntad': [
      'simplemente di no... sin nombre verdadero... sin hechizo... sólo NO...',
      'la voluntad pura... no desear nada de él... ni siquiera victoria...',
    ],
  };

  function getHintWhisper() {
    if (!isActive()) return null;
    const unseen = getUnseenEndings();
    if (unseen.length === 0) return null;

    const targetEnding = unseen[Math.floor(Math.random() * unseen.length)];
    const hints = endingHints[targetEnding];
    if (!hints) return null;

    return {
      text: hints[Math.floor(Math.random() * hints.length)],
      ending: targetEnding,
    };
  }

  return { isActive, getHintWhisper, getUnseenEndings };
})();

// ====== INVENTORY PERCEPTION ATTACK ENGINE ======
// Briefly changes inventory item names to unsettle the player
const PerceptionAttack = (() => {
  const replacements = {
    '🕯️ Vela negra': ['🕯️ Vela vacía', '🕯️ Tu última luz', '🕯️ Cuenta regresiva'],
    '📖 Grimorio de Belphegor': ['📖 TU grimorio', '📖 Libro de carne', '📖 Él te lee'],
    '📜 Inscripción descifrada': ['📜 Mentira descifrada', '📜 Tu sentencia', '📜 ???'],
    '🩸 Sigilo de sangre': ['🩸 Sigilo roto', '🩸 Tu sangre', '🩸 Él lo ve'],
    '💍 Anillo de obsidiana': ['💍 Cadena', '💍 Su garfa', '💍 No sale'],
    '🪞 Fragmento de espejo': ['🪞 Te mira', '🪞 No eres tú', '🪞 Él sonríe'],
    '🫙 Frasco vacío (tu nombre)': ['🫙 Frasco LLENO', '🫙 Ya no está vacío', '🫙 ¿Oyes algo dentro?'],
    '🖤 Masa palpitante': ['🖤 Masa Palpitante (está echando raíces)', '🖤 Masa Palpitante (ahora es parte de tu brazo)', '🖤 Late más fuerte', '🖤 Crece', '🖤 Tiene hambre', '🖤 Se mueve bajo tu piel', '🖤 Ya no puedes soltarla'],
    '👁️ Marca del Demonio': ['👁️ Te ve siempre', '👁️ Más grande', '👁️ ABIERTO'],
    '⚫ Recuerdo del doble': ['⚫ ¿Quién eres?', '⚫ Él es tú', '⚫ ¿O tú eres él?'],
    '📕 Libro de Supervivencia': ['📕 Libro de Mentiras', '📕 TRAMPA', '📕 Lo escribió ÉL'],
    '✨ Nombre verdadero': ['✨ Nombre FALSO', '✨ ¿Seguro?', '✨ Es una trampa'],
    '🛡️ Protección espectral': ['🛡️ Se debilita', '🛡️ Ya no protege', '🛡️ ...¿verdad?'],
    '🦴 Fragmento de hueso': ['🦴 Tu hueso', '🦴 Se mueve', '🦴 Crece'],
    '📄 Página del pacto': ['📄 Firmada', '📄 TU firma', '📄 Siempre estuvo firmada'],
  };

  let attackTimer = null;

  function startAttacks() {
    if (attackTimer) clearInterval(attackTimer);
    attackTimer = setInterval(() => {
      if (state.soul >= 50 || Math.random() > 0.15) return;
      glitchRandomItem();
    }, 12000 + Math.random() * 18000);
  }

  function glitchRandomItem() {
    const invEl = document.getElementById('inventory');
    if (!invEl) return;
    const items = invEl.querySelectorAll('.inv-item');
    if (items.length === 0) return;

    const target = items[Math.floor(Math.random() * items.length)];
    const originalText = target.textContent;
    const alts = replacements[originalText];
    if (!alts) return;

    const fake = alts[Math.floor(Math.random() * alts.length)];

    // Glitch effect
    target.classList.add('inv-item-glitch');
    target.textContent = fake;

    // Revert after 150-400ms (subliminal)
    const revertTime = 150 + Math.random() * 250;
    setTimeout(() => {
      target.textContent = originalText;
      target.classList.remove('inv-item-glitch');
    }, revertTime);

    // Sound accompaniment
    try { SoundDesign.creak(); } catch(e) {}
  }

  function stopAttacks() {
    if (attackTimer) clearInterval(attackTimer);
  }

  return { startAttacks, stopAttacks, glitchRandomItem };
})();

document.addEventListener('visibilitychange', function() {
  if (document.hidden && state.soul > 0 && state.history.length > 0) {
    // El jugador cambió de pestaña por miedo
    if (_titleHijackTimer) clearInterval(_titleHijackTimer);
    _titleHijackTimer = null;
    document.title = '¡¿A DÓNDE CREES QUE VAS?!';
    try {
      if (audioEnabled) SoundDesign.shriek();
    } catch(e) {}
  } else if (!document.hidden && state.soul > 0) {
    // El jugador regresó
    startTitleHijack();
  }
});
