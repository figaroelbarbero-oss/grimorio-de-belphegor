// ====== MACABRE VOICE ENGINE ======
const MacabreVoice = (() => {
  let enabled = false;
  let speaking = false;
  let currentUtterance = null;
  let voiceReady = false;
  let selectedVoice = null;
  let reverbNode = null;
  let voiceGain = null;

  // Preferred voices — deepest/darkest available
  const preferredVoices = [
    'Google español', 'Microsoft Pablo', 'Diego', 'Jorge', 'Andrés',
    'es-ES', 'es-MX', 'es_ES', 'es_MX',
    'Google UK English Male', 'Microsoft David', 'Daniel', 'Alex',
  ];

  function init() {
    if (!('speechSynthesis' in window)) return;

    // Load voices
    const loadVoices = () => {
      const voices = speechSynthesis.getVoices();
      if (voices.length === 0) return;

      // Try to find a Spanish male voice first
      for (const pref of preferredVoices) {
        const match = voices.find(v =>
          v.name.includes(pref) || v.lang.includes(pref)
        );
        if (match) { selectedVoice = match; break; }
      }

      // Fallback: any Spanish voice, then any voice
      if (!selectedVoice) {
        selectedVoice = voices.find(v => v.lang.startsWith('es')) || voices[0];
      }

      voiceReady = true;
    };

    loadVoices();
    speechSynthesis.onvoiceschanged = loadVoices;

    // Create reverb/distortion chain if Web Audio available
    if (audioCtx) {
      setupAudioChain();
    }
  }

  function setupAudioChain() {
    // We'll use Web Audio for ambient effects during speech
    if (!audioCtx) return;

    voiceGain = audioCtx.createGain();
    voiceGain.gain.value = 1;

    // Create impulse response for reverb effect (cathedral-like)
    const sampleRate = audioCtx.sampleRate;
    const length = sampleRate * 3; // 3 second reverb tail
    const impulse = audioCtx.createBuffer(2, length, sampleRate);

    for (let channel = 0; channel < 2; channel++) {
      const data = impulse.getChannelData(channel);
      for (let i = 0; i < length; i++) {
        data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, 2.5);
      }
    }

    reverbNode = audioCtx.createConvolver();
    reverbNode.buffer = impulse;
  }

  // Strip HTML tags for clean TTS text
  function stripHTML(html) {
    const div = document.createElement('div');
    div.innerHTML = html;
    return div.textContent || div.innerText || '';
  }

  // Split text into dramatic chunks for pacing
  function splitIntoPhrases(text) {
    // Split on sentence boundaries and dramatic pauses
    return text
      .replace(/\.\.\./g, '… ')
      .replace(/([.!?])\s/g, '$1|')
      .replace(/—/g, '— |')
      .replace(/<br>/gi, '|')
      .split('|')
      .map(s => s.trim())
      .filter(s => s.length > 0);
  }

  // Speak a single phrase with macabre parameters
  function speakPhrase(text, options = {}) {
    return new Promise((resolve) => {
      if (!voiceReady || !enabled) { resolve(); return; }

      const utterance = new SpeechSynthesisUtterance(text);
      currentUtterance = utterance;

      if (selectedVoice) utterance.voice = selectedVoice;

      // ---- MACABRE VOICE PARAMETERS ----
      const mood = options.mood || 'narrator';

      switch (mood) {
        case 'belphegor':
          // Abyssal, guttural
          utterance.pitch = 0.1 + Math.random() * 0.1;
          utterance.rate = 0.45 + Math.random() * 0.08;
          utterance.volume = 0.9;
          break;
        case 'whisper':
          // Quiet, breathy, low
          utterance.pitch = 0.3 + Math.random() * 0.15;
          utterance.rate = 0.6 + Math.random() * 0.1;
          utterance.volume = 0.35;
          break;
        case 'scream':
          // Distorted roar (lower than before)
          utterance.pitch = 0.8 + Math.random() * 0.3;
          utterance.rate = 1.2;
          utterance.volume = 1.0;
          break;
        case 'narrator':
        default:
          // Deep gravelly narrator — much lower pitch
          utterance.pitch = 0.15 + Math.random() * 0.1;
          utterance.rate = 0.55 + Math.random() * 0.08;
          utterance.volume = 0.9;
          break;
      }

      // Random micro-variations for uncanny effect
      utterance.pitch += (Math.random() - 0.5) * 0.05;
      utterance.rate += (Math.random() - 0.5) * 0.03;

      utterance.onend = () => {
        speaking = false;
        resolve();
      };

      utterance.onerror = () => {
        speaking = false;
        resolve();
      };

      speaking = true;
      speechSynthesis.speak(utterance);
    });
  }

  // Play ambient horror effect during speech pauses
  function playAmbientDuringSpeech() {
    if (!audioCtx || !audioEnabled) return;

    // Low rumble under the voice
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = 35 + Math.random() * 10;
    gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 2);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 2);
  }

  // Determine mood from text content
  function detectMood(text) {
    const lower = text.toLowerCase();
    if (lower.includes('"') && (lower.includes('belphegor') || lower.includes('susurr') || lower.includes('voz'))) return 'belphegor';
    if (lower.includes('grit') || lower.includes('¡') || lower.includes('GRITA')) return 'scream';
    if (lower.includes('susurr') || lower.includes('whisper') || lower.includes('murmu')) return 'whisper';
    return 'narrator';
  }

  // ---- MAIN: Narrate full scene text ----
  async function narrateScene(html) {
    if (!enabled || !voiceReady) return;

    // Cancel any ongoing speech
    stop();

    const cleanText = stripHTML(html);
    const phrases = splitIntoPhrases(cleanText);

    for (let i = 0; i < phrases.length; i++) {
      if (!enabled) break; // Allow stopping mid-narration

      const phrase = phrases[i];
      const mood = detectMood(phrase);

      // Ambient rumble before Belphegor speaks
      if (mood === 'belphegor') {
        playAmbientDuringSpeech();
        await pause(300);
      }

      await speakPhrase(phrase, { mood });

      // Dramatic pauses between phrases
      const pauseTime = mood === 'belphegor' ? 600 + Math.random() * 400
        : mood === 'whisper' ? 400 + Math.random() * 300
        : 200 + Math.random() * 300;

      await pause(pauseTime);
    }
  }

  function pause(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  function stop() {
    speechSynthesis.cancel();
    speaking = false;
    currentUtterance = null;
  }

  function toggle() {
    enabled = !enabled;
    const btn = document.getElementById('voice-toggle');

    if (enabled) {
      init();
      btn.classList.add('active');
      btn.textContent = '🗣 VOZ ON';
      DemonWhispers.setActive(true);
    } else {
      stop();
      btn.classList.remove('active');
      btn.textContent = '🗣 VOZ';
      DemonWhispers.setActive(false);
    }
    return enabled;
  }

  return {
    toggle,
    narrateScene,
    stop,
    isEnabled: () => enabled,
    isSpeaking: () => speaking,
  };
})();

function toggleVoice() {
  MacabreVoice.toggle();
}

// ====== DEMONIC SOUND DESIGN ENGINE ======
const SoundDesign = (() => {

  // Helper: get audio context
  function ctx() { return audioCtx; }
  function ok() { return audioCtx && audioEnabled; }

  // Helper: create distortion curve
  function makeDistortion(amount) {
    const n = 44100;
    const curve = new Float32Array(n);
    for (let i = 0; i < n; i++) {
      const x = (i * 2) / n - 1;
      curve[i] = ((3 + amount) * x * 20 * (Math.PI / 180)) / (Math.PI + amount * Math.abs(x));
    }
    return curve;
  }

  // ============================================================
  //  IMPACT SOUNDS — heavy, brutal, visceral
  // ============================================================

  // Massive sub-bass impact (chest-thumping boom)
  function demonImpact() {
    if (!ok()) return;
    const c = ctx();
    const t = c.currentTime;

    // Sub oscillator — deep boom
    const sub = c.createOscillator();
    const subGain = c.createGain();
    sub.type = 'sine';
    sub.frequency.setValueAtTime(60, t);
    sub.frequency.exponentialRampToValueAtTime(15, t + 0.8);
    subGain.gain.setValueAtTime(0.7, t);
    subGain.gain.exponentialRampToValueAtTime(0.001, t + 0.8);
    sub.connect(subGain); subGain.connect(c.destination);
    sub.start(t); sub.stop(t + 0.8);

    // Distorted mid crack
    const mid = c.createOscillator();
    const midGain = c.createGain();
    const dist = c.createWaveShaper();
    dist.curve = makeDistortion(400);
    mid.type = 'sawtooth';
    mid.frequency.setValueAtTime(150, t);
    mid.frequency.exponentialRampToValueAtTime(30, t + 0.3);
    midGain.gain.setValueAtTime(0.4, t);
    midGain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
    mid.connect(dist); dist.connect(midGain); midGain.connect(c.destination);
    mid.start(t); mid.stop(t + 0.4);

    // Noise burst — transient snap
    const noise = c.createBufferSource();
    const nBuf = c.createBuffer(1, c.sampleRate * 0.1, c.sampleRate);
    const nData = nBuf.getChannelData(0);
    for (let i = 0; i < nData.length; i++) nData[i] = (Math.random() * 2 - 1) * Math.pow(1 - i/nData.length, 3);
    noise.buffer = nBuf;
    const nGain = c.createGain();
    nGain.gain.setValueAtTime(0.5, t);
    nGain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
    noise.connect(nGain); nGain.connect(c.destination);
    noise.start(t);
  }

  // Bone crack / snap
  function boneCrack() {
    if (!ok()) return;
    const c = ctx(); const t = c.currentTime;

    for (let i = 0; i < 3; i++) {
      const osc = c.createOscillator();
      const g = c.createGain();
      const f = c.createBiquadFilter();
      osc.type = 'square';
      osc.frequency.setValueAtTime(800 + Math.random() * 2000, t + i * 0.04);
      osc.frequency.exponentialRampToValueAtTime(100 + Math.random() * 200, t + i * 0.04 + 0.03);
      f.type = 'highpass'; f.frequency.value = 500;
      g.gain.setValueAtTime(0.35, t + i * 0.04);
      g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.04 + 0.05);
      osc.connect(f); f.connect(g); g.connect(c.destination);
      osc.start(t + i * 0.04); osc.stop(t + i * 0.04 + 0.06);
    }
  }

  // Metal door slam
  function doorSlam() {
    if (!ok()) return;
    const c = ctx(); const t = c.currentTime;

    // Low metallic resonance
    const osc = c.createOscillator();
    const g = c.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(90, t);
    osc.frequency.exponentialRampToValueAtTime(40, t + 1.2);
    g.gain.setValueAtTime(0.5, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 1.2);
    osc.connect(g); g.connect(c.destination);
    osc.start(t); osc.stop(t + 1.2);

    // Metallic crash transient
    const noise = c.createBufferSource();
    const buf = c.createBuffer(1, c.sampleRate * 0.15, c.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i/d.length, 8);
    noise.buffer = buf;
    const nf = c.createBiquadFilter();
    nf.type = 'bandpass'; nf.frequency.value = 2000; nf.Q.value = 2;
    const ng = c.createGain();
    ng.gain.setValueAtTime(0.6, t);
    ng.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
    noise.connect(nf); nf.connect(ng); ng.connect(c.destination);
    noise.start(t);

    // Reverb tail
    const rev = c.createOscillator();
    const rg = c.createGain();
    rev.type = 'sine';
    rev.frequency.value = 65;
    rg.gain.setValueAtTime(0.15, t + 0.1);
    rg.gain.exponentialRampToValueAtTime(0.001, t + 2);
    rev.connect(rg); rg.connect(c.destination);
    rev.start(t + 0.1); rev.stop(t + 2);
  }

  // ============================================================
  //  DEMONIC VOCALS — screams, growls, roars
  // ============================================================

  // Demonic scream — layered oscillators with distortion
  function demonScream() {
    if (!ok()) return;
    const c = ctx(); const t = c.currentTime;
    const duration = 1.5 + Math.random() * 0.5;

    // 3 layered screaming oscillators
    const freqs = [200 + Math.random()*100, 350 + Math.random()*150, 550 + Math.random()*200];
    freqs.forEach((freq, i) => {
      const osc = c.createOscillator();
      const g = c.createGain();
      const dist = c.createWaveShaper();
      dist.curve = makeDistortion(300 + i * 100);

      osc.type = i === 0 ? 'sawtooth' : i === 1 ? 'square' : 'sawtooth';
      osc.frequency.setValueAtTime(freq, t);
      // Pitch bends for organic screaming
      osc.frequency.setValueAtTime(freq * 1.5, t + 0.05);
      osc.frequency.exponentialRampToValueAtTime(freq * 0.6, t + duration * 0.3);
      osc.frequency.setValueAtTime(freq * 1.2, t + duration * 0.5);
      osc.frequency.exponentialRampToValueAtTime(freq * 0.3, t + duration);

      // Volume envelope — attack, sustain, release
      g.gain.setValueAtTime(0.001, t);
      g.gain.linearRampToValueAtTime(0.2 - i * 0.04, t + 0.03);
      g.gain.setValueAtTime(0.18 - i * 0.04, t + duration * 0.6);
      g.gain.exponentialRampToValueAtTime(0.001, t + duration);

      osc.connect(dist); dist.connect(g); g.connect(c.destination);
      osc.start(t); osc.stop(t + duration);
    });

    // Noise breath layer
    const nBuf = c.createBuffer(1, c.sampleRate * duration, c.sampleRate);
    const nD = nBuf.getChannelData(0);
    for (let i = 0; i < nD.length; i++) {
      const env = Math.sin(Math.PI * i / nD.length);
      nD[i] = (Math.random() * 2 - 1) * 0.08 * env;
    }
    const ns = c.createBufferSource(); ns.buffer = nBuf;
    const nf = c.createBiquadFilter(); nf.type = 'bandpass'; nf.frequency.value = 1200; nf.Q.value = 1;
    ns.connect(nf); nf.connect(c.destination);
    ns.start(t);
  }

  // Deep demonic growl
  function demonGrowl() {
    if (!ok()) return;
    const c = ctx(); const t = c.currentTime;
    const dur = 2 + Math.random();

    // Two detuned sawtooths for thick growl
    for (let i = 0; i < 2; i++) {
      const osc = c.createOscillator();
      const g = c.createGain();
      const dist = c.createWaveShaper();
      dist.curve = makeDistortion(500);
      const f = c.createBiquadFilter();
      f.type = 'lowpass'; f.frequency.value = 300;

      osc.type = 'sawtooth';
      const baseFreq = 50 + i * 3; // slight detune
      osc.frequency.setValueAtTime(baseFreq, t);
      // Slow modulation
      osc.frequency.setValueAtTime(baseFreq * 1.1, t + dur * 0.3);
      osc.frequency.setValueAtTime(baseFreq * 0.9, t + dur * 0.6);
      osc.frequency.setValueAtTime(baseFreq * 0.7, t + dur);

      g.gain.setValueAtTime(0.001, t);
      g.gain.linearRampToValueAtTime(0.25, t + 0.2);
      g.gain.setValueAtTime(0.2, t + dur * 0.7);
      g.gain.exponentialRampToValueAtTime(0.001, t + dur);

      osc.connect(dist); dist.connect(f); f.connect(g); g.connect(c.destination);
      osc.start(t); osc.stop(t + dur);
    }
  }

  // Inhuman shriek (high, piercing)
  function shriek() {
    if (!ok()) return;
    const c = ctx(); const t = c.currentTime;

    const osc = c.createOscillator();
    const g = c.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(2000, t);
    osc.frequency.exponentialRampToValueAtTime(4000, t + 0.1);
    osc.frequency.exponentialRampToValueAtTime(800, t + 0.6);

    g.gain.setValueAtTime(0.001, t);
    g.gain.linearRampToValueAtTime(0.3, t + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.6);

    const dist = c.createWaveShaper();
    dist.curve = makeDistortion(200);
    osc.connect(dist); dist.connect(g); g.connect(c.destination);
    osc.start(t); osc.stop(t + 0.6);
  }

  // Demonic laughter — rhythmic bursts
  function demonLaugh() {
    if (!ok()) return;
    const c = ctx(); const t = c.currentTime;

    const laughBursts = 5 + Math.floor(Math.random() * 4);
    for (let i = 0; i < laughBursts; i++) {
      const offset = i * 0.18;
      const osc = c.createOscillator();
      const g = c.createGain();
      const dist = c.createWaveShaper();
      dist.curve = makeDistortion(250);

      osc.type = 'sawtooth';
      const base = 120 + Math.random() * 40;
      osc.frequency.setValueAtTime(base * (1 + (i % 2) * 0.3), t + offset);
      osc.frequency.exponentialRampToValueAtTime(base * 0.6, t + offset + 0.12);

      g.gain.setValueAtTime(0.2, t + offset);
      g.gain.exponentialRampToValueAtTime(0.001, t + offset + 0.14);

      osc.connect(dist); dist.connect(g); g.connect(c.destination);
      osc.start(t + offset); osc.stop(t + offset + 0.15);
    }
  }

  // ============================================================
  //  ATMOSPHERIC — chains, creaks, wind, heartbeat
  // ============================================================

  // Chains rattling
  function chains() {
    if (!ok()) return;
    const c = ctx(); const t = c.currentTime;

    for (let i = 0; i < 8; i++) {
      const offset = i * (0.08 + Math.random() * 0.06);
      const osc = c.createOscillator();
      const g = c.createGain();
      const f = c.createBiquadFilter();

      osc.type = 'triangle';
      osc.frequency.setValueAtTime(3000 + Math.random() * 4000, t + offset);
      osc.frequency.exponentialRampToValueAtTime(500 + Math.random() * 1000, t + offset + 0.04);

      f.type = 'highpass'; f.frequency.value = 1500;
      g.gain.setValueAtTime(0.15 + Math.random() * 0.1, t + offset);
      g.gain.exponentialRampToValueAtTime(0.001, t + offset + 0.06);

      osc.connect(f); f.connect(g); g.connect(c.destination);
      osc.start(t + offset); osc.stop(t + offset + 0.07);
    }
  }

  // Wood creaking
  function creak() {
    if (!ok()) return;
    const c = ctx(); const t = c.currentTime;
    const dur = 0.6 + Math.random() * 0.4;

    const osc = c.createOscillator();
    const g = c.createGain();
    const f = c.createBiquadFilter();

    osc.type = 'sawtooth';
    const base = 200 + Math.random() * 300;
    // Creaking = slow frequency wobble
    osc.frequency.setValueAtTime(base, t);
    for (let s = 0; s < 6; s++) {
      const time = t + (s / 6) * dur;
      osc.frequency.setValueAtTime(base + (Math.random() - 0.5) * 150, time);
    }

    f.type = 'bandpass'; f.frequency.value = base; f.Q.value = 10;
    g.gain.setValueAtTime(0.001, t);
    g.gain.linearRampToValueAtTime(0.12, t + 0.05);
    g.gain.setValueAtTime(0.1, t + dur * 0.8);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);

    osc.connect(f); f.connect(g); g.connect(c.destination);
    osc.start(t); osc.stop(t + dur);
  }

  // Hellish wind
  function hellWind() {
    if (!ok()) return;
    const c = ctx(); const t = c.currentTime;
    const dur = 3 + Math.random() * 2;

    const buf = c.createBuffer(2, c.sampleRate * dur, c.sampleRate);
    for (let ch = 0; ch < 2; ch++) {
      const d = buf.getChannelData(ch);
      for (let i = 0; i < d.length; i++) {
        const env = Math.sin(Math.PI * i / d.length);
        d[i] = (Math.random() * 2 - 1) * 0.06 * env;
      }
    }
    const src = c.createBufferSource(); src.buffer = buf;
    const f = c.createBiquadFilter();
    f.type = 'bandpass';
    f.frequency.setValueAtTime(300, t);
    f.frequency.linearRampToValueAtTime(800, t + dur * 0.5);
    f.frequency.linearRampToValueAtTime(200, t + dur);
    f.Q.value = 2;

    const pan = c.createStereoPanner();
    pan.pan.setValueAtTime(-0.8, t);
    pan.pan.linearRampToValueAtTime(0.8, t + dur);

    src.connect(f); f.connect(pan); pan.connect(c.destination);
    src.start(t);
  }

  // Heavy heartbeat (dread inducing)
  function dreadHeartbeat(beats) {
    if (!ok()) return;
    const c = ctx(); const t = c.currentTime;
    const count = beats || 6;
    // Sync visual heartbeat with audio
    try { HeartbeatSync.startSync(75, count * 0.8); } catch(e) {}

    for (let b = 0; b < count; b++) {
      const beatTime = t + b * 0.8; // 75 BPM

      // LUB (low)
      const lub = c.createOscillator();
      const lg = c.createGain();
      lub.type = 'sine';
      lub.frequency.value = 40;
      lg.gain.setValueAtTime(0.4, beatTime);
      lg.gain.exponentialRampToValueAtTime(0.001, beatTime + 0.15);
      lub.connect(lg); lg.connect(c.destination);
      lub.start(beatTime); lub.stop(beatTime + 0.15);

      // DUB (slightly higher, delayed)
      const dub = c.createOscillator();
      const dg = c.createGain();
      dub.type = 'sine';
      dub.frequency.value = 55;
      dg.gain.setValueAtTime(0.3, beatTime + 0.2);
      dg.gain.exponentialRampToValueAtTime(0.001, beatTime + 0.35);
      dub.connect(dg); dg.connect(c.destination);
      dub.start(beatTime + 0.2); dub.stop(beatTime + 0.35);
    }
  }

  // ============================================================
  //  SUPERNATURAL — choir, reverb hits, dimensional tears
  // ============================================================

  // Infernal choir — stacked detuned voices
  function infernalChoir() {
    if (!ok()) return;
    const c = ctx(); const t = c.currentTime;
    const dur = 4 + Math.random() * 2;

    const notes = [110, 138.6, 164.8, 220, 277.2]; // Am chord with tension
    notes.forEach((freq, i) => {
      const osc = c.createOscillator();
      const g = c.createGain();
      const f = c.createBiquadFilter();

      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq + (Math.random() - 0.5) * 3, t);
      // Slow vibrato
      const lfo = c.createOscillator();
      const lfoG = c.createGain();
      lfo.frequency.value = 4 + Math.random() * 2;
      lfoG.gain.value = freq * 0.008;
      lfo.connect(lfoG); lfoG.connect(osc.frequency);
      lfo.start(t); lfo.stop(t + dur);

      f.type = 'bandpass'; f.frequency.value = freq * 2; f.Q.value = 1;

      g.gain.setValueAtTime(0.001, t);
      g.gain.linearRampToValueAtTime(0.06, t + dur * 0.3);
      g.gain.setValueAtTime(0.05, t + dur * 0.7);
      g.gain.exponentialRampToValueAtTime(0.001, t + dur);

      osc.connect(f); f.connect(g); g.connect(c.destination);
      osc.start(t + i * 0.3); osc.stop(t + dur);
    });
  }

  // Dimensional tear — rising then collapsing frequencies
  function dimensionalTear() {
    if (!ok()) return;
    const c = ctx(); const t = c.currentTime;

    // Rising sweep
    const osc = c.createOscillator();
    const g = c.createGain();
    const dist = c.createWaveShaper();
    dist.curve = makeDistortion(150);

    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(40, t);
    osc.frequency.exponentialRampToValueAtTime(2000, t + 1.5);
    osc.frequency.exponentialRampToValueAtTime(20, t + 2);

    g.gain.setValueAtTime(0.001, t);
    g.gain.linearRampToValueAtTime(0.25, t + 1.2);
    g.gain.exponentialRampToValueAtTime(0.001, t + 2);

    osc.connect(dist); dist.connect(g); g.connect(c.destination);
    osc.start(t); osc.stop(t + 2);

    // Accompanying rumble
    const sub = c.createOscillator();
    const sg = c.createGain();
    sub.type = 'sine'; sub.frequency.value = 25;
    sg.gain.setValueAtTime(0.3, t);
    sg.gain.exponentialRampToValueAtTime(0.001, t + 2.5);
    sub.connect(sg); sg.connect(c.destination);
    sub.start(t); sub.stop(t + 2.5);
  }

  // Reverse cymbal / riser (tension builder)
  function tensionRiser() {
    if (!ok()) return;
    const c = ctx(); const t = c.currentTime;
    const dur = 3;

    const buf = c.createBuffer(1, c.sampleRate * dur, c.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) {
      const progress = i / d.length;
      const env = progress * progress * progress; // exponential rise
      d[i] = (Math.random() * 2 - 1) * env * 0.2;
    }
    const src = c.createBufferSource(); src.buffer = buf;
    const f = c.createBiquadFilter();
    f.type = 'highpass';
    f.frequency.setValueAtTime(200, t);
    f.frequency.exponentialRampToValueAtTime(8000, t + dur);

    src.connect(f); f.connect(c.destination);
    src.start(t);
  }

  // ============================================================
  //  COMPOSITE SEQUENCES — pre-built horror moments
  // ============================================================

  // Full jumpscare sequence: riser → silence → BOOM + scream
  function jumpscareSound() {
    if (!ok()) return;
    tensionRiser();
    setTimeout(() => {
      demonImpact();
      demonScream();
      chains();
    }, 3200);
  }

  // Death sequence: heartbeat slowing → growl → silence → choir
  function deathSequence() {
    if (!ok()) return;
    dreadHeartbeat(4);
    setTimeout(() => demonGrowl(), 3500);
    setTimeout(() => infernalChoir(), 5000);
  }

  // Ritual ambience: wind + chains + choir
  function ritualAmbience() {
    if (!ok()) return;
    hellWind();
    setTimeout(() => chains(), 1000);
    setTimeout(() => infernalChoir(), 2000);
  }

  // Something approaching: creaks + heartbeat + impact
  function somethingApproaches() {
    if (!ok()) return;
    creak();
    setTimeout(() => dreadHeartbeat(3), 800);
    setTimeout(() => creak(), 2000);
    setTimeout(() => doorSlam(), 3500);
  }

  // Demonic manifestation: tear + growl + choir
  function demonicManifestation() {
    if (!ok()) return;
    dimensionalTear();
    setTimeout(() => demonGrowl(), 1500);
    setTimeout(() => demonScream(), 2500);
    setTimeout(() => infernalChoir(), 3500);
  }

  // Random ambient horror sound
  function randomAmbient() {
    if (!ok()) return;
    const sounds = [creak, chains, hellWind, boneCrack, demonGrowl, shriek];
    sounds[Math.floor(Math.random() * sounds.length)]();
  }

  return {
    // Individual sounds
    demonImpact, boneCrack, doorSlam,
    demonScream, demonGrowl, shriek, demonLaugh,
    chains, creak, hellWind, dreadHeartbeat,
    infernalChoir, dimensionalTear, tensionRiser,
    // Sequences
    jumpscareSound, deathSequence, ritualAmbience,
    somethingApproaches, demonicManifestation, randomAmbient,
  };
})();

  var personalWhispers = [

      // Try to use a different voice than the narrator for variety
      const voices = speechSynthesis.getVoices();
      if (voices.length > 1) {

        const candidates = voices.filter(v => v.lang.startsWith('es'));

  function onChoicesShown(choices) {
    if (!active) return;
    stopAll();

    const numChoices = choices.length;
    if (numChoices < 2) return;

    // Select 2-4 personas to argue
    const shuffledPersonas = [...personas].sort(() => Math.random() - 0.5);
    const arguers = shuffledPersonas.slice(0, Math.min(numChoices + 1, 4));

    let delay = 1500 + Math.random() * 2000; // First whisper after 1.5-3.5s

    arguers.forEach((persona, idx) => {
      const style = persona.style;
      const tmpl = templates[style];

      // First: suggest a choice
      const suggestion = pick(tmpl.suggest);
      scheduleWhisper(suggestion, persona, delay);
      delay += 2500 + Math.random() * 2000;

      // Then: contradict a previous suggestion (50% chance)
      if (idx > 0 && Math.random() < 0.5) {
        const contradiction = pick(tmpl.contradict);
        scheduleWhisper(contradiction, persona, delay);
        delay += 2000 + Math.random() * 1500;
      }
    });

    // Occasionally throw in a second round of argument
    if (Math.random() < 0.4) {
      const extraPersona = pick(arguers);
      const extraStyle = extraPersona.style;
      scheduleWhisper(pick(templates[extraStyle].contradict), extraPersona, delay);
      delay += 2000;
      const rebuttal = pick(arguers.filter(p => p !== extraPersona));
      if (rebuttal) {
        scheduleWhisper(pick(templates[rebuttal.style].suggest), rebuttal, delay);
      }
    }

    // Add ambient whisper noise (Web Audio) underneath
    playWhisperAmbience();
  }

  // ---- Ambient whispers during gameplay (not tied to choices) ----
  function startAmbientWhispers() {
    if (!active) return;

    const ambientLoop = () => {
      if (!active) return;
      const delay = 25000 + Math.random() * 40000; // Every 25-65 seconds

      const timer = setTimeout(() => {
        if (!active) return;

        // Don't interrupt narrator
        if (MacabreVoice.isSpeaking()) {
          ambientLoop();
          return;
        }

        // At low soul, use personalized name-whispers 50% of the time
        var text;
        if (state.soul < 40 && state.playerName && state.playerName !== 'Desconocido' && Math.random() < 0.5) {
          text = getPersonalWhisper();
        } else {
          text = pick(ambientWhispers);
        }
        const persona = pick(personas);
        whisper(text, { ...persona, vol: persona.vol * 0.7 }); // Even quieter for ambient

        // Small chance of a second whisper responding
        if (Math.random() < 0.3) {
          const timer2 = setTimeout(() => {
            const responder = pick(personas.filter(p => p !== persona));
            const responses = ['cállate...', 'no...', 'mientes...', 'shhh...', 'ya basta...', 'déjalo...'];
            whisper(pick(responses), { ...responder, vol: responder.vol * 0.6 });
          }, 1500 + Math.random() * 1000);
          whisperTimers.push(timer2);
        }

        ambientLoop();
      }, delay);
      whisperTimers.push(timer);
    };

    // First ambient whisper after 10-20s
    setTimeout(ambientLoop, 10000 + Math.random() * 10000);
  }

  // Soft noise bed under whispers
  function playWhisperAmbience() {
    if (!audioCtx || !audioEnabled) return;

    const duration = 8;
    const bufferSize = audioCtx.sampleRate * duration;
    const buffer = audioCtx.createBuffer(2, bufferSize, audioCtx.sampleRate);

    for (let ch = 0; ch < 2; ch++) {
      const data = buffer.getChannelData(ch);
      for (let i = 0; i < bufferSize; i++) {
        // Filtered noise that sounds like distant murmuring
        const t = i / audioCtx.sampleRate;
        const envelope = Math.sin(Math.PI * t / duration); // fade in/out
        data[i] = (Math.random() * 2 - 1) * 0.008 * envelope;
      }
    }

    const source = audioCtx.createBufferSource();
    source.buffer = buffer;

    const filter = audioCtx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = 500 + Math.random() * 400;
    filter.Q.value = 3;

    const gain = audioCtx.createGain();
    gain.gain.value = 0.15;

    // Slight stereo panning for spatial effect
    const panner = audioCtx.createStereoPanner();
    panner.pan.value = (Math.random() - 0.5) * 1.6; // wide stereo field

    source.connect(filter);
    filter.connect(panner);
    panner.connect(gain);
    gain.connect(audioCtx.destination);
    source.start();
  }

  function stopAll() {
    whisperTimers.forEach(clearTimeout);
    whisperTimers = [];
    // Note: we don't cancel speechSynthesis here to avoid
    // killing the narrator — whispers die naturally (they're short)
  }

  function setActive(val) {
    active = val;
    if (active) startAmbientWhispers();
    else stopAll();
  }

  return {
    onChoicesShown,
    stopAll,
    setActive,
    isActive: () => active,
  };
})();

  // ---- UPDATE PROFILE FROM GAME STATE ----
  function updateProfile(sceneId, choiceRisk) {
    profile.totalChoices++;
    profile.corruption = Math.max(0, 100 - (state.soul || 100));

    // Profile from risk taken
    if (riskProfile[choiceRisk]) {
      Object.entries(riskProfile[choiceRisk]).forEach(([k, v]) => {
        profile[k] = (profile[k] || 0) + v;
      });
    }

    // Profile from flags
    Object.keys(state.flags || {}).forEach(flag => {
      if (state.flags[flag] && traitTriggers[flag]) {
        Object.entries(traitTriggers[flag]).forEach(([k, v]) => {
          profile[k] = Math.max(profile[k] || 0, v); // cap, don't stack
        });
      }
    });

    // Remember specific choices
    belphegor.memoryOfChoices.push(sceneId);
    if (belphegor.memoryOfChoices.length > 20) belphegor.memoryOfChoices.shift();

    // Update Belphegor's mood based on profile
    updateBelphegorMood();
  }

  // ---- BELPHEGOR MOOD ENGINE ----
  function updateBelphegorMood() {
    const p = profile;
    const b = belphegor;

    b.interest = Math.min(100, 50 + p.occultism * 3 + p.boldness * 2 + p.corruption * 0.5);
    b.respect = Math.floor(p.defiance * 2 + p.wisdom * 3 - p.submission * 2 - p.fear * 1);
    b.frustration = Math.min(100, p.defiance * 3 + (p.wisdom > 8 ? 20 : 0));

    // Determine mood
    if (b.frustration > 70 && b.respect > 30) {
      b.mood = 'afraid'; b.speechStyle = 'desperate';
    } else if (b.frustration > 60) {
      b.mood = 'angry'; b.speechStyle = 'threatening';
    } else if (p.submission > 8 && p.corruption > 5) {
      b.mood = 'hungry'; b.speechStyle = 'seductive';
    } else if (b.respect > 40) {
      b.mood = 'respectful'; b.speechStyle = 'formal';
    } else if (b.respect < -20) {
      b.mood = 'amused'; b.speechStyle = 'mocking';
    } else {
      b.mood = 'curious'; b.speechStyle = 'formal';
    }

    // Track known traits
    b.knownPlayerTraits = [];
    if (p.boldness > 5) b.knownPlayerTraits.push('audaz');
    if (p.fear > 5) b.knownPlayerTraits.push('temeroso');
    if (p.wisdom > 5) b.knownPlayerTraits.push('sabio');
    if (p.defiance > 5) b.knownPlayerTraits.push('rebelde');
    if (p.submission > 5) b.knownPlayerTraits.push('sumiso');
    if (p.curiosity > 5) b.knownPlayerTraits.push('curioso');
    if (p.occultism > 5) b.knownPlayerTraits.push('ocultista');
    if (p.cruelty > 3) b.knownPlayerTraits.push('cruel');
    if (p.corruption > 40) b.knownPlayerTraits.push('corrupto');
  }

    traits.forEach(t => { if (profile[t] > max) { max = profile[t]; dom = t; }});

  // ======================================================================
  //  NARRATIVE GENERATION ENGINE
  // ======================================================================

  function pick(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  function pickUnique(arr, count) {
    const shuffled = [...arr].sort(() => Math.random() - 0.5);
    return shuffled.slice(0, Math.min(count, arr.length));
  }

  // Generate a Belphegor line based on current mood and context
  function getBelphegorLine(type) {
    const lines = belphegorLines[belphegor.mood];
    if (!lines || !lines[type]) {
      return belphegorLines.curious[type] ? pick(belphegorLines.curious[type]) : '';
    }
    return pick(lines[type]);
  }

  // Generate a trait-based narration for the player
  function getTraitNarration() {
    const dominant = getDominantTrait();
    if (traitNarrations[dominant]) {
      return `<br><br><span class="whisper">${pick(traitNarrations[dominant])}</span>`;
    }
    return '';
  }

  // Generate a memory callback if the player visited a memorable scene
  function getMemoryCallback() {
    const visited = belphegor.memoryOfChoices.filter(s => memoryCallbacks[s]);
    if (visited.length === 0) return '';
    const scene = visited[Math.floor(Math.random() * visited.length)];
    return `<br><br><span class="whisper">${pick(memoryCallbacks[scene])}</span>`;
  }

  // Generate ambient sensory detail
  function getSensoryDetail() {
    const category = pick(Object.keys(senses));
    return pick(senses[category]);
  }

  // Generate environment description based on scene chapter
  function getEnvironment(chapter) {
    let pools = [];
    if (chapter.includes('Umbral')) pools = ['darkness', 'cold', 'house'];
    else if (chapter.includes('Casa')) pools = ['house', 'whispers', 'decay'];
    else if (chapter.includes('Grimorio')) pools = ['whispers', 'decay', 'cold'];
    else if (chapter.includes('Contacto')) pools = ['whispers', 'darkness', 'cold'];
    else if (chapter.includes('Ritual') || chapter.includes('Invocación')) pools = ['ritual', 'darkness', 'cold'];
    else if (chapter.includes('Juicio')) pools = ['ritual', 'whispers', 'darkness'];
    else if (chapter.includes('FINAL')) pools = ['ritual', 'cold', 'darkness'];
    else pools = ['darkness', 'house', 'whispers'];

    const env = pick(pools);
    return environments[env] ? pick(environments[env]) : pick(environments.darkness);
  }

  // ---- MAIN: ENHANCE SCENE TEXT ----
  function enhanceNarrative(sceneId, originalText, chapter) {
    let enhanced = originalText;

    // 1. Inject environment description at start (30% chance if not a final)
    if (!chapter.includes('FINAL') && Math.random() < 0.3) {
      const env = getEnvironment(chapter);
      enhanced = `<span class="whisper">${env}</span><br><br>${enhanced}`;
    }

    // 2. Inject sensory detail mid-text (40% chance)
    if (Math.random() < 0.4) {
      const sensory = getSensoryDetail();
      const insertPoint = enhanced.lastIndexOf('<br><br>');
      if (insertPoint > enhanced.length * 0.3) {
        enhanced = enhanced.slice(0, insertPoint) +
          `<br><br><span class="whisper">${sensory}</span>` +
          enhanced.slice(insertPoint);
      }
    }

    // 3. Inject Belphegor dialogue if in late chapters (50% chance)
    const isLate = chapter.includes('IV') || chapter.includes('V') || chapter.includes('VI') || chapter.includes('VII') || chapter.includes('FINAL');
    if (isLate && Math.random() < 0.5) {
      const lineType = Math.random() < 0.3 ? 'greeting' : (Math.random() < 0.5 ? 'taunt' : 'observation');
      const line = getBelphegorLine(lineType);
      if (line) {
        enhanced += `<br><br><span class="highlight">${line}</span>`;
      }
    }

    // 4. Inject trait narration (25% chance)
    if (profile.totalChoices > 2 && Math.random() < 0.25) {
      enhanced += getTraitNarration();
    }

    // 5. Inject memory callback (20% chance, only after 3+ choices)
    if (profile.totalChoices > 3 && Math.random() < 0.2) {
      enhanced += getMemoryCallback();
    }

    // 6. Belphegor directly addresses player traits (15% chance, late game)
    if (isLate && belphegor.knownPlayerTraits.length > 0 && Math.random() < 0.15) {
      const trait = pick(belphegor.knownPlayerTraits);
      const directAddress = getDirectAddress(trait);
      if (directAddress) {
        enhanced += `<br><br><span class="highlight">${directAddress}</span>`;
      }
    }

    return enhanced;
  }

  // Belphegor directly commenting on a player trait
  function getDirectAddress(trait) {
    const addresses = {
      audaz: [
        '"Tu audacia... ¿es coraje o ignorancia? He visto ambas. Saben igual al principio."',
        '"Los valientes mueren primero. Pero mueren de pie. Eso tiene algo de poesía."',
        '"No te falta valor. Te falta miedo. Y el miedo existe por una razón."',
      ],
      temeroso: [
        '"Puedo oler tu terror. Es exquisito. Como un vino que mejora con cada minuto."',
        '"El miedo es inteligencia primitiva. Tu cuerpo sabe lo que tu mente se niega a aceptar."',
        '"Tiemblas. Bien. Los que no tiemblan aquí son los que ya están muertos."',
      ],
      sabio: [
        '"Conocimiento. El narcótico más adictivo de la creación. Y tú, querido, eres un adicto."',
        '"Sabes demasiado para tu propio bien. Literalmente."',
        '"La sabiduría sin poder es tortura. Saber lo que viene y no poder evitarlo."',
      ],
      rebelde: [
        '"¿Rebeldía? ¿Contra MÍ? ...Me gusta. Hace eones que no siento resistencia real."',
        '"Cada NO que pronuncias me interesa más. Los sumisos son aburridos."',
        '"Tu desafío es como una llama en la oscuridad. Hermosa. Y muy, muy localizable."',
      ],
      sumiso: [
        '"Qué fácil. Qué deliciosamente fácil eres."',
        '"No necesito cadenas para ti. Ya vienes con las tuyas."',
        '"Tu obediencia me nutre. Pero no te confundas: no te la agradezco."',
      ],
      curioso: [
        '"¿Quieres saber más? Siempre hay más. Más profundo. Más oscuro. Más... irrecuperable."',
        '"La curiosidad mató al gato. Pero yo... yo le enseñé lo que había al otro lado."',
        '"Haces preguntas peligrosas. Las mejores preguntas siempre lo son."',
      ],
      ocultista: [
        '"Reconoces los símbolos. Los pronuncias con acento correcto. Has hecho esto antes."',
        '"Tu afinidad con lo oculto es... natural. Demasiado natural. ¿Nunca te preguntaste por qué?"',
        '"No todos pueden leer el Grimorio sin perder la cordura. Tú puedes. Piensa en lo que eso significa."',
      ],
      cruel: [
        '"Ah. Reconozco eso. Esa chispa detrás de los ojos. La disfrutaste, ¿verdad? La destrucción."',
        '"No todos los demonios tienen cuernos. Algunos nacen humanos."',
        '"Tu crueldad tiene un perfume que conozco bien. Sabe a hogar."',
      ],
      corrupto: [
        '"Ya casi no necesitas convencimiento. La corrupción trabaja sola a partir de cierto punto."',
        '"¿Sientes cómo la oscuridad ya no te resulta incómoda? Eso es evolución."',
        '"Tu alma tiene manchas que no se limpian. Y cada una fue una elección tuya."',
      ],
    };
    return addresses[trait] ? pick(addresses[trait]) : null;
  }

  // ======================================================================
  //  DYNAMIC CHOICE MODIFICATION
  // ======================================================================
  function enhanceChoiceText(originalText, risk) {
    // Occasionally add Belphegor whispering about a choice (10% per choice)
    if (Math.random() < 0.10 && belphegor.mood !== 'afraid') {
      const whispers = {
        safe: [' [susurra: "cobarde..."]', ' [una voz murmura: "aburrido..."]', ' [algo suspira: "predecible"]'],
        medium: [' [un susurro: "interesante..."]', ' [una voz: "hmmm..."]', ' [algo ronronea]'],
        high: [' [un susurro hambriento: "sí... hazlo..."]', ' [la voz tiembla: "atrévete..."]'],
        fatal: [' [ALGO GRITA EN TU CABEZA: "¡¡SÍ!!"]', ' [tu sangre hierve]', ' [la oscuridad te empuja]'],
      };
      const pool = whispers[risk] || whispers.medium;
      return originalText + `<span class="whisper">${pick(pool)}</span>`;
    }
    return originalText;
  }

  // ======================================================================
  //  RANDOM ENCOUNTER EVENTS (between scenes)
  // ======================================================================
  const randomEvents = [
    {
      condition: () => profile.totalChoices > 2 && profile.totalChoices < 10 && Math.random() < 0.12,
      text: () => `<br><br><span class="whisper">${pick([
        'De pronto, ves algo con el rabillo del ojo. Una figura. Cuando volteas, no hay nada. Pero la temperatura bajó tres grados.',
        'Las luces parpadean — si es que a estos destellos se les puede llamar luces. Por un instante, ves un rostro en la pared. Luego desaparece.',
        'Un golpe. Seco. Definitivo. Viene de abajo. De MUY abajo.',
        'Algo roza tu tobillo. Miras: nada. Pero hay una marca fresca en tu piel.',
        'Tu reflejo en una superficie pulida sonríe. Tú no estás sonriendo.',
      ])}</span>`,
      effect: () => { if (typeof JumpscareEngine !== 'undefined') setTimeout(() => JumpscareEngine.subliminal(), 500); },
    },
    {
      condition: () => profile.fear > 3 && Math.random() < 0.15,
      text: () => `<br><br><span class="highlight">${pick([
        'Tu corazón se detiene. Un segundo completo sin latir. Luego arranca de nuevo. Más rápido.',
        'Escuchas tu nombre. Claro. Nítido. Dicho con tu propia voz. Desde atrás.',
        'El suelo bajo tus pies se vuelve blando por un instante. Como carne.',
      ])}</span>`,
      effect: () => { if (typeof JumpscareEngine !== 'undefined') JumpscareEngine.creepyText(); },
    },
    {
      condition: () => profile.occultism > 4 && Math.random() < 0.12,
      text: () => `<br><br><span class="gold">${pick([
        'Los símbolos del Grimorio arden en tu visión. Ves runas donde antes veías paredes. Ves patrones donde antes veías caos.',
        'Un conocimiento nuevo se desliza en tu mente como una serpiente tibia. No lo aprendiste — lo recordaste.',
        'Las letras del Grimorio se reordenan ante tus ojos. Un mensaje nuevo. Sólo para ti.',
      ])}</span>`,
      effect: () => {},
    },
    {
      condition: () => belphegor.mood === 'angry' && Math.random() < 0.2,
      text: () => `<br><br><span class="highlight">${pick([
        'Las paredes se estrechan. No metafóricamente — LITERALMENTE. Escuchas la mampostería quejarse.',
        'Todas las velas se apagan de golpe. Tres segundos de oscuridad total. Cuando vuelven, están más rojas.',
        'Un rugido gutural sacude la casa. Los cimientos vibran. El polvo cae del techo.',
      ])}</span>`,
      effect: () => { if (typeof JumpscareEngine !== 'undefined') JumpscareEngine.glitch(); },
    },
    {
      condition: () => profile.corruption > 30 && Math.random() < 0.15,
      text: () => `<br><br><span class="whisper">${pick([
        'Miras tus manos. Tus venas son visibles. Negras. Por un parpadeo, tu piel parece... translúcida.',
        'Algo se mueve bajo tu piel. En tu antebrazo. Como un gusano. Luego se detiene.',
        'Saboreas sangre en tu boca. No te mordiste. La sangre no es tuya.',
      ])}</span>`,
      effect: () => {},
    },
    {
      condition: () => belphegor.mood === 'hungry' && Math.random() < 0.15,
      text: () => `<br><br><span class="highlight">${pick([
        'Una lengua invisible recorre tu nuca. Lenta. Evaluándote.',
        'Sientes brazos rodearte desde atrás. No hay nadie. Pero el abrazo se siente... real.',
        'El aire a tu alrededor se espesa. Como si algo inmenso respirara a través de ti.',
      ])}</span>`,
      effect: () => { if (typeof JumpscareEngine !== 'undefined') setTimeout(() => JumpscareEngine.doorPeek(), 1000); },
    },
  ];

  function getRandomEvent() {
    const applicable = randomEvents.filter(e => e.condition());
    if (applicable.length === 0) return { text: '', effect: () => {} };
    const event = pick(applicable);
    return { text: event.text(), effect: event.effect };
  }

  // ======================================================================
  //  DYNAMIC DIFFICULTY ADJUSTMENT
  // ======================================================================
  function adjustSoulLoss(baseLoss) {
    const dom = getDominantTrait();
    let multiplier = 1;
    if (dom === 'submission') multiplier = 1.3;
    if (dom === 'defiance') multiplier = 0.8;
    if (dom === 'wisdom') multiplier = 0.7;
    if (dom === 'fear') multiplier = 1.1;
    if (dom === 'occultism' && profile.corruption > 30) multiplier = 1.2;
    if (belphegor.mood === 'angry') multiplier *= 1.15;
    if (belphegor.mood === 'afraid') multiplier *= 0.6;
    return Math.round(baseLoss * multiplier);
  }

  // ======================================================================
  //  PUBLIC API
  // ======================================================================
  return {
    updateProfile,
    enhanceNarrative,
    enhanceChoiceText,
    getRandomEvent,
    adjustSoulLoss,
    getBelphegorLine,
    getProfile: () => ({ ...profile }),
    getBelphegor: () => ({ ...belphegor }),
    getDominantTrait,
  };

})();

// ====== JUMPSCARE ENGINE ======
const JumpscareEngine = (() => {
  let scareCount = 0;
  let lastScareTime = 0;
  let ambientTimers = [];
  let peripheralActive = false;
  const MIN_SCARE_INTERVAL = 15000; // minimum 15s between scares

  // ---- PROCEDURAL HORROR FACE GENERATOR ----
  function drawHorrorFace(ctx, w, h, variant) {
    ctx.clearRect(0, 0, w, h);
    ctx.fillStyle = 'black';
    ctx.fillRect(0, 0, w, h);

    const cx = w / 2, cy = h / 2;

    if (variant === 'ghost') {
      // Pale ghost face — long black hair, hollow eyes, dark mouth
      // Hair
      ctx.fillStyle = '#0a0a0a';
      ctx.beginPath();
      ctx.ellipse(cx, cy - h*0.05, w*0.35, h*0.45, 0, 0, Math.PI*2);
      ctx.fill();

      // Face
      const faceGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, h*0.25);
      faceGrad.addColorStop(0, '#c8b8a8');
      faceGrad.addColorStop(0.6, '#8a7a6a');
      faceGrad.addColorStop(1, '#1a1a1a');
      ctx.fillStyle = faceGrad;
      ctx.beginPath();
      ctx.ellipse(cx, cy, w*0.18, h*0.22, 0, 0, Math.PI*2);
      ctx.fill();

      // Hollow eyes — large, black, empty
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.ellipse(cx - w*0.07, cy - h*0.04, w*0.045, h*0.06, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(cx + w*0.07, cy - h*0.04, w*0.045, h*0.06, 0, 0, Math.PI*2);
      ctx.fill();

      // Tiny red pupils
      ctx.fillStyle = '#660000';
      ctx.beginPath();
      ctx.arc(cx - w*0.07, cy - h*0.03, 2, 0, Math.PI*2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(cx + w*0.07, cy - h*0.03, 2, 0, Math.PI*2);
      ctx.fill();

      // Dark gaping mouth
      ctx.fillStyle = '#0a0000';
      ctx.beginPath();
      ctx.ellipse(cx, cy + h*0.1, w*0.06, h*0.05, 0, 0, Math.PI*2);
      ctx.fill();

      // Hair strands over face
      ctx.strokeStyle = '#080808';
      ctx.lineWidth = 2;
      for (let i = 0; i < 15; i++) {
        ctx.beginPath();
        const sx = cx + (Math.random() - 0.5) * w * 0.4;
        ctx.moveTo(sx, cy - h*0.3);
        ctx.quadraticCurveTo(sx + (Math.random()-0.5)*30, cy, sx + (Math.random()-0.5)*20, cy + h*0.35);
        ctx.stroke();
      }

    } else if (variant === 'demon') {
      // Horned silhouette with glowing red eyes
      ctx.fillStyle = '#0a0005';
      // Body silhouette
      ctx.beginPath();
      ctx.moveTo(cx - w*0.25, h);
      ctx.lineTo(cx - w*0.15, cy - h*0.1);
      ctx.lineTo(cx - w*0.2, cy - h*0.35); // left horn
      ctx.lineTo(cx - w*0.08, cy - h*0.15);
      ctx.lineTo(cx, cy - h*0.2);
      ctx.lineTo(cx + w*0.08, cy - h*0.15);
      ctx.lineTo(cx + w*0.2, cy - h*0.35); // right horn
      ctx.lineTo(cx + w*0.15, cy - h*0.1);
      ctx.lineTo(cx + w*0.25, h);
      ctx.fill();

      // Glowing red eyes
      const eyeGlow = ctx.createRadialGradient(cx - w*0.05, cy - h*0.05, 0, cx - w*0.05, cy - h*0.05, 15);
      eyeGlow.addColorStop(0, '#ff0000');
      eyeGlow.addColorStop(0.5, '#880000');
      eyeGlow.addColorStop(1, 'transparent');
      ctx.fillStyle = eyeGlow;
      ctx.fillRect(cx - w*0.1, cy - h*0.1, w*0.1, h*0.1);

      const eyeGlow2 = ctx.createRadialGradient(cx + w*0.05, cy - h*0.05, 0, cx + w*0.05, cy - h*0.05, 15);
      eyeGlow2.addColorStop(0, '#ff0000');
      eyeGlow2.addColorStop(0.5, '#880000');
      eyeGlow2.addColorStop(1, 'transparent');
      ctx.fillStyle = eyeGlow2;
      ctx.fillRect(cx, cy - h*0.1, w*0.1, h*0.1);

    } else if (variant === 'smile') {
      // Jeff-the-killer style — white face, huge eyes, carved smile
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, w, h);

      // White face
      ctx.fillStyle = '#e8e0d0';
      ctx.beginPath();
      ctx.ellipse(cx, cy, w*0.22, h*0.28, 0, 0, Math.PI*2);
      ctx.fill();

      // Huge unblinking eyes
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.ellipse(cx - w*0.08, cy - h*0.06, w*0.055, h*0.055, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(cx + w*0.08, cy - h*0.06, w*0.055, h*0.055, 0, 0, Math.PI*2);
      ctx.fill();

      // Black pupils — small, focused
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.arc(cx - w*0.08, cy - h*0.06, 4, 0, Math.PI*2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(cx + w*0.08, cy - h*0.06, 4, 0, Math.PI*2);
      ctx.fill();

      // Carved smile
      ctx.strokeStyle = '#8b0000';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(cx - w*0.14, cy + h*0.04);
      ctx.quadraticCurveTo(cx, cy + h*0.18, cx + w*0.14, cy + h*0.04);
      ctx.stroke();

      // Teeth in smile
      ctx.fillStyle = '#ddd';
      for (let i = -5; i <= 5; i++) {
        ctx.fillRect(cx + i * 7, cy + h*0.06, 5, 8);
      }

      // Dark around face
      ctx.strokeStyle = '#1a0a0a';
      ctx.lineWidth = 1;
      for (let i = 0; i < 20; i++) {
        ctx.beginPath();
        const sx = cx + (Math.random()-0.5) * w*0.5;
        ctx.moveTo(sx, cy - h*0.35);
        ctx.quadraticCurveTo(sx + (Math.random()-0.5)*40, cy, sx + (Math.random()-0.5)*30, cy + h*0.4);
        ctx.stroke();
      }

    } else if (variant === 'mask') {
      // Stitched mask face — b&w
      ctx.fillStyle = '#111';
      ctx.fillRect(0, 0, w, h);

      // Pale mask
      ctx.fillStyle = '#b0a090';
      ctx.beginPath();
      ctx.ellipse(cx, cy, w*0.17, h*0.24, 0, 0, Math.PI*2);
      ctx.fill();

      // Dark empty eye sockets
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.ellipse(cx - w*0.06, cy - h*0.04, w*0.035, h*0.04, -0.2, 0, Math.PI*2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(cx + w*0.06, cy - h*0.04, w*0.035, h*0.04, 0.2, 0, Math.PI*2);
      ctx.fill();

      // Stitched mouth
      ctx.strokeStyle = '#3a2a1a';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(cx - w*0.08, cy + h*0.08);
      ctx.lineTo(cx + w*0.08, cy + h*0.08);
      ctx.stroke();
      // Stitches
      for (let i = -3; i <= 3; i++) {
        ctx.beginPath();
        ctx.moveTo(cx + i*10, cy + h*0.06);
        ctx.lineTo(cx + i*10, cy + h*0.1);
        ctx.stroke();
      }

      // Crack lines
      ctx.strokeStyle = '#2a1a0a';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(cx + w*0.05, cy - h*0.2);
      ctx.lineTo(cx + w*0.03, cy + h*0.05);
      ctx.stroke();

    } else if (variant === 'clown') {
      // Sinister vintage clown
      ctx.fillStyle = '#080808';
      ctx.fillRect(0, 0, w, h);

      // White face
      ctx.fillStyle = '#d8d0c0';
      ctx.beginPath();
      ctx.ellipse(cx, cy, w*0.2, h*0.25, 0, 0, Math.PI*2);
      ctx.fill();

      // Dark eye hollows
      ctx.fillStyle = '#1a0a0a';
      ctx.beginPath();
      ctx.ellipse(cx - w*0.07, cy - h*0.05, w*0.04, h*0.035, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(cx + w*0.07, cy - h*0.05, w*0.04, h*0.035, 0, 0, Math.PI*2);
      ctx.fill();

      // Red nose
      ctx.fillStyle = '#8b0000';
      ctx.beginPath();
      ctx.arc(cx, cy + h*0.02, 8, 0, Math.PI*2);
      ctx.fill();

      // Wide grin
      ctx.fillStyle = '#1a0000';
      ctx.beginPath();
      ctx.moveTo(cx - w*0.12, cy + h*0.08);
      ctx.quadraticCurveTo(cx, cy + h*0.2, cx + w*0.12, cy + h*0.08);
      ctx.fill();

      // Ruff collar
      ctx.strokeStyle = '#3a3a3a';
      ctx.lineWidth = 2;
      for (let i = 0; i < 20; i++) {
        const angle = (i / 20) * Math.PI;
        ctx.beginPath();
        ctx.moveTo(cx + Math.cos(angle) * w*0.15, cy + h*0.22);
        ctx.lineTo(cx + Math.cos(angle) * w*0.25, cy + h*0.28);
        ctx.stroke();
      }

    } else if (variant === 'ritual') {
      // Hooded figures with candles
      const bgGrad = ctx.createRadialGradient(cx, h*0.7, 0, cx, h*0.7, h*0.6);
      bgGrad.addColorStop(0, '#1a0a00');
      bgGrad.addColorStop(1, '#000');
      ctx.fillStyle = bgGrad;
      ctx.fillRect(0, 0, w, h);

      // Hooded figures in semicircle
      for (let i = 0; i < 7; i++) {
        const angle = Math.PI * 0.15 + (i / 6) * Math.PI * 0.7;
        const fx = cx + Math.cos(angle) * w * 0.35;
        const fy = cy + Math.sin(angle) * h * 0.15 + h*0.1;

        // Robe
        ctx.fillStyle = '#0a0a0a';
        ctx.beginPath();
        ctx.moveTo(fx, fy - 30);
        ctx.lineTo(fx - 15, fy + 50);
        ctx.lineTo(fx + 15, fy + 50);
        ctx.fill();

        // Hood
        ctx.beginPath();
        ctx.arc(fx, fy - 25, 12, 0, Math.PI*2);
        ctx.fill();

        // Candle glow
        const candleGlow = ctx.createRadialGradient(fx, fy, 0, fx, fy, 20);
        candleGlow.addColorStop(0, 'rgba(255,150,50,0.3)');
        candleGlow.addColorStop(1, 'transparent');
        ctx.fillStyle = candleGlow;
        ctx.fillRect(fx - 20, fy - 20, 40, 40);
      }

      // Central horned figure
      ctx.fillStyle = '#050005';
      ctx.beginPath();
      ctx.moveTo(cx - 25, h*0.8);
      ctx.lineTo(cx - 15, cy - 20);
      ctx.lineTo(cx - 25, cy - 60); // left horn
      ctx.lineTo(cx - 5, cy - 30);
      ctx.lineTo(cx + 5, cy - 30);
      ctx.lineTo(cx + 25, cy - 60); // right horn
      ctx.lineTo(cx + 15, cy - 20);
      ctx.lineTo(cx + 25, h*0.8);
      ctx.fill();

      // Eyes
      ctx.fillStyle = '#cc0000';
      ctx.beginPath();
      ctx.arc(cx - 6, cy - 15, 3, 0, Math.PI*2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(cx + 6, cy - 15, 3, 0, Math.PI*2);
      ctx.fill();
    }

    // Add noise/grain to all variants
    const imageData = ctx.getImageData(0, 0, w, h);
    const data = imageData.data;
    for (let i = 0; i < data.length; i += 4) {
      const noise = (Math.random() - 0.5) * 25;
      data[i] += noise;
      data[i+1] += noise;
      data[i+2] += noise;
    }
    ctx.putImageData(imageData, 0, 0);
  }

  // ---- STATIC NOISE GENERATOR ----
  function generateStatic(ctx, w, h) {
    const imageData = ctx.createImageData(w, h);
    const d = imageData.data;
    for (let i = 0; i < d.length; i += 4) {
      const v = Math.random() * 255;
      d[i] = v; d[i+1] = v; d[i+2] = v;
      d[i+3] = Math.random() * 100;
    }
    ctx.putImageData(imageData, 0, 0);
  }

  // ---- MUSIC DYNAMICS ----
  function musicSurge() {
    // Spike music volume during scares
    if (!musicPlaying) return;
    const origVol = horrorMusic.volume;
    horrorMusic.volume = Math.min(1, origVol + 0.4);
    setTimeout(() => {
      // Fade back down
      const fadeDown = setInterval(() => {
        if (horrorMusic.volume > origVol + 0.02) {
          horrorMusic.volume -= 0.02;
        } else {
          horrorMusic.volume = origVol;
          clearInterval(fadeDown);
        }
      }, 50);
    }, 800);
  }

  function musicDrop() {
    // Brief silence before scare for contrast
    if (!musicPlaying) return;
    const origVol = horrorMusic.volume;
    horrorMusic.volume = 0.05;
    setTimeout(() => { horrorMusic.volume = origVol; }, 400);
  }

  // ---- JUMPSCARE AUDIO (powered by SoundDesign engine) ----
  function playJumpscareSound(type) {
    if (!audioCtx || !audioEnabled) return;
    musicSurge();

    if (type === 'full') {
      // Brutal: impact + scream + chains
      SoundDesign.demonImpact();
      setTimeout(() => SoundDesign.demonScream(), 50);
      setTimeout(() => SoundDesign.chains(), 200);
    } else if (type === 'subliminal') {
      // Quick: impact + bone crack
      SoundDesign.demonImpact();
      SoundDesign.boneCrack();
    } else if (type === 'whisper') {
      // Eerie: hell wind + distant growl
      SoundDesign.hellWind();
      setTimeout(() => SoundDesign.demonGrowl(), 500);
    } else if (type === 'heartbeat') {
      SoundDesign.dreadHeartbeat(4);
    } else if (type === 'scream') {
      SoundDesign.demonScream();
    } else if (type === 'laugh') {
      SoundDesign.demonLaugh();
    } else if (type === 'ritual') {
      SoundDesign.ritualAmbience();
    } else if (type === 'death') {
      SoundDesign.deathSequence();
    } else if (type === 'manifest') {
      SoundDesign.demonicManifestation();
    } else if (type === 'approach') {
      SoundDesign.somethingApproaches();
    } else if (type === 'door') {
      SoundDesign.doorSlam();
    } else if (type === 'choir') {
      SoundDesign.infernalChoir();
    } else if (type === 'tear') {
      SoundDesign.dimensionalTear();
    } else if (type === 'riser') {
      SoundDesign.tensionRiser();
    }
  }

  // ---- MAIN JUMPSCARE TYPES ----

  // 1) Full-screen face jumpscare
  // Real scare photos — preloaded for instant jumpscares
  var _scarePhotos = [
    'media/jump1.jpg', 'media/jump2.jpg', 'media/jump3.jpg', 'media/jump4.jpg',
    'media/sub1.jpg', 'media/sub2.jpg', 'media/sub3.jpg',
    'media/skull_nun.jpg', 'media/ritual_goats.jpg', 'media/deer_cult.jpg',
    'media/rabbit_followers.jpg', 'media/carnival_mask.jpg',
  ];
  var _preloadedScareImgs = [];
  for (var _si = 0; _si < _scarePhotos.length; _si++) {
    var _simg = new Image(); _simg.src = _scarePhotos[_si]; _preloadedScareImgs.push(_simg);
  }

  function drawRealPhoto(ctx, w, h, canvasEl) {
    var img = _preloadedScareImgs[Math.floor(Math.random() * _preloadedScareImgs.length)];
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, w, h);
    if (!img || !img.complete) return;
    var scale = Math.max(w / img.naturalWidth, h / img.naturalHeight);
    var dw = img.naturalWidth * scale, dh = img.naturalHeight * scale;
    ctx.drawImage(img, (w - dw) / 2, (h - dh) / 2, dw, dh);
    // Horror filter via CSS (avoids cross-origin getImageData error on file://)
    if (canvasEl) canvasEl.style.filter = 'brightness(0.5) contrast(2.0) saturate(0.3) sepia(0.3) hue-rotate(-10deg)';
  }

  function triggerFullJumpscare(variant) {
    const now = Date.now();
    if (now - lastScareTime < MIN_SCARE_INTERVAL) return;
    lastScareTime = now;
    scareCount++;

    const overlay = document.getElementById('jumpscare-overlay');
    const canvas = document.getElementById('jumpscare-canvas');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const ctx = canvas.getContext('2d');

    drawRealPhoto(ctx, canvas.width, canvas.height, canvas);

    musicDrop();
    setTimeout(() => playJumpscareSound('full'), 400);
    document.body.classList.add('shake');

    overlay.style.opacity = '1';
    overlay.classList.add('active');
    document.body.classList.add('screen-corrupt');

    setTimeout(() => {
      overlay.style.opacity = '0';
      overlay.classList.remove('active');
      document.body.classList.remove('shake', 'screen-corrupt');
    }, 600 + Math.random() * 400);
  }

  // 2) Subliminal PHOTO flash
  function triggerSubliminal() {
    const overlay = document.getElementById('subliminal-flash');
    const canvas = document.getElementById('subliminal-canvas');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const ctx = canvas.getContext('2d');

    drawRealPhoto(ctx, canvas.width, canvas.height, canvas);

    playJumpscareSound('subliminal');

    const duration = 50 + Math.random() * 100;
    overlay.style.opacity = '0.7';
    setTimeout(() => { overlay.style.opacity = '0'; }, duration);
  }

  // 3) VHS Glitch effect
  function triggerGlitch() {
    const glitch = document.getElementById('vhs-glitch');
    const canvas = document.getElementById('glitch-canvas');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const ctx = canvas.getContext('2d');
    generateStatic(ctx, canvas.width, canvas.height);

    // Also add scan lines
    ctx.strokeStyle = 'rgba(255,0,0,0.1)';
    ctx.lineWidth = 1;
    for (let y = 0; y < canvas.height; y += 3) {
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(canvas.width, y);
      ctx.stroke();
    }

    glitch.classList.add('active');
    playJumpscareSound('subliminal');

    setTimeout(() => { glitch.classList.remove('active'); glitch.style.opacity = '0'; }, 600);
  }

  // 4) Static noise burst
  function triggerStatic() {
    const el = document.getElementById('static-overlay');
    const c = document.createElement('canvas');
    c.width = 100; c.height = 100;
    const ctx = c.getContext('2d');
    generateStatic(ctx, 100, 100);
    el.style.backgroundImage = `url(${c.toDataURL()})`;
    el.classList.add('active');
    setTimeout(() => { el.classList.remove('active'); }, 600);
  }

  // 5) Door peek — slow figure sliding in from edge
  function triggerDoorPeek() {
    const canvas = document.getElementById('door-peek');
    canvas.width = 200;
    canvas.height = window.innerHeight * 0.6;
    const ctx = canvas.getContext('2d');

    // Draw a peeking figure
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, 200, canvas.height);

    // Partial face visible on left edge
    const faceX = 40;
    const faceY = canvas.height * 0.3;

    ctx.fillStyle = '#2a2020';
    ctx.beginPath();
    ctx.ellipse(faceX, faceY, 50, 65, 0, -Math.PI*0.5, Math.PI*0.5);
    ctx.fill();

    // One visible eye
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.ellipse(faceX + 15, faceY - 10, 10, 14, 0, 0, Math.PI*2);
    ctx.fill();

    // Red pupil
    ctx.fillStyle = '#990000';
    ctx.beginPath();
    ctx.arc(faceX + 17, faceY - 8, 3, 0, Math.PI*2);
    ctx.fill();

    // Body below
    ctx.fillStyle = '#050505';
    ctx.fillRect(0, faceY + 50, 60, canvas.height);

    canvas.style.opacity = '0.6';
    canvas.classList.add('peeking');

    setTimeout(() => {
      canvas.classList.remove('peeking');
      canvas.classList.add('retreat');
      setTimeout(() => {
        canvas.classList.remove('retreat');
        canvas.style.opacity = '0';
      }, 500);
    }, 6000 + Math.random() * 4000);
  }

  // 6) Creepy text flash
  function triggerCreepyText() {
    const el = document.getElementById('creepy-text');
    const texts = [
      'TE VEO', 'DETRÁS DE TI', 'NO ESTÁS SOLO', '¿ME RECUERDAS?',
      'ABRE LOS OJOS', 'BELPHEGOR', 'TU ALMA ES MÍA', 'NO ESCAPARÁS',
      'MÍRAME', '...VIENE...', 'ADIÓS', 'ESTOY AQUÍ',
      'CORR E', 'N O  T E  M U E V A S', '6 6 6'

    el.style.top = (10 + Math.random() * 70) + '%';
    el.style.left = (5 + Math.random() * 60) + '%';
    el.style.fontSize = (2 + Math.random() * 4) + 'rem';
    el.style.transform = `rotate(${(Math.random()-0.5)*20}deg)`;
    el.style.opacity = '0.8';

    playJumpscareSound('whisper');

    setTimeout(() => { el.style.opacity = '0'; }, 800 + Math.random() * 1200);
  }

  // 7) Shadow figure in background
  function spawnShadowFigure() {
    const fig = document.createElement('canvas');
    fig.className = 'shadow-figure';
    fig.width = 120;
    fig.height = 300;
    const ctx = fig.getContext('2d');

    // Dark humanoid silhouette
    ctx.fillStyle = 'rgba(5,2,8,0.9)';
    ctx.beginPath();
    ctx.ellipse(60, 35, 20, 25, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillRect(45, 55, 30, 120);
    ctx.fillRect(30, 70, 15, 80);
    ctx.fillRect(75, 70, 15, 80);
    ctx.fillRect(45, 170, 15, 100);
    ctx.fillRect(60, 170, 15, 100);

    // Faint red eyes
    ctx.fillStyle = 'rgba(139,0,0,0.6)';
    ctx.beginPath();
    ctx.arc(53, 32, 2, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(67, 32, 2, 0, Math.PI*2);
    ctx.fill();

    const side = Math.random() > 0.5 ? 'left' : 'right';
    fig.style[side] = (2 + Math.random()*8) + '%';
    fig.style.bottom = '0';

    document.body.appendChild(fig);

    // Slow fade in
    setTimeout(() => { fig.style.opacity = '0.08'; fig.style.transition = 'opacity 8s ease-in'; }, 100);

    // Then fade out and remove
    setTimeout(() => {
      fig.style.opacity = '0';
      fig.style.transition = 'opacity 5s ease-out';
      setTimeout(() => fig.remove(), 5000);
    }, 10000 + Math.random() * 10000);
  }

  // 8) Combined horror sequence — multiple effects chained
  function triggerHorrorSequence() {
    triggerStatic();
    setTimeout(() => triggerGlitch(), 200);
    setTimeout(() => triggerFullJumpscare(), 500);
    setTimeout(() => triggerCreepyText(), 1200);
    setTimeout(() => playJumpscareSound('heartbeat'), 2000);
  }

  // ---- AMBIENT SCARE SYSTEM ----
  function startAmbientScares() {
    // Subliminal flashes every 30-90s
    ambientTimers.push(setInterval(() => {
      if (Math.random() < 0.4) triggerSubliminal();
    }, 30000 + Math.random() * 60000));

    // Shadow figures every 45-120s
    ambientTimers.push(setInterval(() => {
      if (Math.random() < 0.3) spawnShadowFigure();
    }, 45000 + Math.random() * 75000));

    // Creepy text whispers every 40-80s
    ambientTimers.push(setInterval(() => {
      if (Math.random() < 0.35) triggerCreepyText();
    }, 40000 + Math.random() * 40000));

    // Door peek every 60-180s
    ambientTimers.push(setInterval(() => {
      if (Math.random() < 0.2) triggerDoorPeek();
    }, 60000 + Math.random() * 120000));

    // VHS glitch every 25-60s
    ambientTimers.push(setInterval(() => {
      if (Math.random() < 0.5) triggerGlitch();
    }, 25000 + Math.random() * 35000));

    // First scare — subliminal after 8-15s
    setTimeout(() => triggerSubliminal(), 8000 + Math.random() * 7000);

    // First shadow figure after 20s
    setTimeout(() => spawnShadowFigure(), 20000);
  }

  function stopAmbientScares() {
    ambientTimers.forEach(clearInterval);
    ambientTimers = [];
  }

  // ---- PUBLIC API ----
  return {
    fullJumpscare: triggerFullJumpscare,
    subliminal: triggerSubliminal,
    glitch: triggerGlitch,
    static: triggerStatic,
    doorPeek: triggerDoorPeek,
    creepyText: triggerCreepyText,
    shadow: spawnShadowFigure,
    horrorSequence: triggerHorrorSequence,
    startAmbient: startAmbientScares,
    stopAmbient: stopAmbientScares,
    scareCount: () => scareCount,
  };
})();

// ====== TEXT CORRUPTION ENGINE ======
// Progressive visual corruption when soul < 40
const TextCorruption = (() => {
  const corruptChars = '̷̸̵̶̡̢̧̨̛̖̗̘̙̜̝̞̟̠̣̤̥̦̩̪̫̬̭̮̯̰̱̲̳̹̺̻̼̀́̂̃̄̅̆̇̈̉̊̋̌̍̎̏̐̑̒̓̔̽̾̿̀́͂̓̈́͆͊͋͌̕̚͠͡ͅ'.split('');
  const glitchSymbols = ['⛧','▓','░','█','╳','◆','⬡','☠','♰','⛤','∞','Ω','λ','ψ','†'];
  let corruptionInterval = null;
  let active = false;

  function getIntensity() {
    const soul = state.soul;
    if (soul >= 40) return 0;
    if (soul >= 30) return 1;  // light
    if (soul >= 20) return 2;  // medium
    if (soul >= 10) return 3;  // heavy
    return 4;                   // extreme
  }

  function addZalgo(char, intensity) {
    let result = char;
    const count = Math.floor(Math.random() * intensity) + 1;
    for (let i = 0; i < count; i++) {
      result += corruptChars[Math.floor(Math.random() * corruptChars.length)];
    }
    return result;
  }

  // Corrupt visible text in the narrative
  function corruptNarrative() {
    const intensity = getIntensity();
    if (intensity === 0) return;

    const narrative = document.getElementById('narrative');
    if (!narrative) return;

    const walker = document.createTreeWalker(narrative, NodeFilter.SHOW_TEXT);
    const textNodes = [];
    while (walker.nextNode()) textNodes.push(walker.currentNode);

    // Chance to corrupt each text node scales with intensity
    const corruptChance = intensity * 0.04;

    textNodes.forEach(node => {
      if (Math.random() > corruptChance) return;
      const text = node.textContent;
      if (text.trim().length < 3) return;

      // Pick 1-3 random positions to corrupt
      const positions = [];
      const numCorruptions = Math.min(intensity, Math.ceil(text.length * 0.05));
      for (let i = 0; i < numCorruptions; i++) {
        positions.push(Math.floor(Math.random() * text.length));
      }

      let corrupted = '';
      for (let i = 0; i < text.length; i++) {
        if (positions.includes(i) && text[i] !== ' ') {
          if (Math.random() < 0.3 * intensity) {
            corrupted += glitchSymbols[Math.floor(Math.random() * glitchSymbols.length)];
          } else {
            corrupted += addZalgo(text[i], intensity);
          }
        } else {
          corrupted += text[i];
        }
      }
      node.textContent = corrupted;
    });
  }

  // Periodically re-corrupt visible text
  function startCorruptionLoop() {
    if (active) return;
    active = true;
    corruptionInterval = setInterval(() => {
      const intensity = getIntensity();
      if (intensity === 0) return;
      // Random single-character flicker corruption
      if (Math.random() < 0.3 + intensity * 0.15) {
        corruptNarrative();
      }
    }, 4000 - getIntensity() * 600);
  }

  function stopCorruptionLoop() {
    if (corruptionInterval) clearInterval(corruptionInterval);
    active = false;
  }

  // Apply corruption to text BEFORE it renders (called from typewrite)
  function corruptText(text) {
    const intensity = getIntensity();
    if (intensity === 0) return text;

    // Insert occasional glitch spans into the HTML
    const words = text.split(' ');
    const corruptChance = 0.02 * intensity;

    return words.map(word => {
      if (Math.random() < corruptChance && !word.includes('<') && !word.includes('>')) {
        return `<span class="corruption-glitch" data-glitch="${word}">${word}</span>`;
      }
      return word;
    }).join(' ');
  }

  return { corruptNarrative, corruptText, startCorruptionLoop, stopCorruptionLoop, getIntensity };
})();

// ====== HEARTBEAT SYNC ENGINE ======
// Synchronizes visual blood-pulse with audio dreadHeartbeat
const HeartbeatSync = (() => {
  let syncActive = false;
  let beatInterval = null;

  function startSync(bpm, duration) {
    if (syncActive) stopSync();
    syncActive = true;

    const intervalMs = 60000 / bpm;
    const ouija = document.getElementById('ouija-frame');
    const vignette = document.getElementById('vignette');
    const soulFill = document.getElementById('soul-fill');

    let beats = 0;
    const maxBeats = duration ? Math.ceil((duration * 1000) / intervalMs) : Infinity;

    beatInterval = setInterval(() => {
      if (!syncActive || beats >= maxBeats) { stopSync(); return; }
      beats++;

      // Visual heartbeat pulse on ouija frame
      ouija.classList.remove('heartbeat-sync');
      void ouija.offsetWidth; // force reflow
      ouija.classList.add('heartbeat-sync');

      // Vignette pulse
      if (vignette) {
        vignette.style.transition = 'none';
        vignette.style.boxShadow = 'inset 0 0 180px rgba(139,0,0,0.5)';
        setTimeout(() => {
          vignette.style.transition = 'box-shadow 0.4s ease';
          vignette.style.boxShadow = 'inset 0 0 150px rgba(0,0,0,0.8)';
        }, 150);
      }

      // Soul bar throb
      if (soulFill) {
        soulFill.style.filter = 'brightness(1.8)';
        setTimeout(() => { soulFill.style.filter = 'brightness(1)'; }, 200);
      }

      // Screen micro-shake on intense moments
      if (state.soul < 30) {
        document.body.style.transform = `translate(${(Math.random()-0.5)*2}px, ${(Math.random()-0.5)*2}px)`;
        setTimeout(() => { document.body.style.transform = 'none'; }, 80);
      }
    }, intervalMs);
  }

  function stopSync() {
    if (beatInterval) clearInterval(beatInterval);
    syncActive = false;
    const ouija = document.getElementById('ouija-frame');
    if (ouija) ouija.classList.remove('heartbeat-sync');
  }

  // Auto-trigger on high tension scenes
  function checkTension() {
    const soul = state.soul;
    const intensity = NarrativeAI.getBelphegor().mood;
    if (soul < 30 || intensity === 'angry' || intensity === 'desperate') {
      startSync(80, 8); // 80 BPM for 8 seconds
    } else if (soul < 50) {
      startSync(60, 5);
    }
  }

  return { startSync, stopSync, checkTension };
})();
