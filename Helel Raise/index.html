<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>El Grimorio de Belphegor</title>
<link rel="stylesheet" href="css/grimorio.css?v=2">
</head>
<body>

<canvas id="bg-canvas"></canvas>
<canvas id="particle-canvas" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none;"></canvas>

<!-- Pentagram SVG Background -->
<svg id="pentagram-bg" viewBox="0 0 200 200">
  <polygon points="100,10 127,75 195,75 140,115 160,185 100,145 40,185 60,115 5,75 73,75"
    fill="none" stroke="#8b0000" stroke-width="0.5"/>
  <circle cx="100" cy="100" r="90" fill="none" stroke="#8b0000" stroke-width="0.3"/>
  <circle cx="100" cy="100" r="95" fill="none" stroke="#2d0050" stroke-width="0.2"/>
</svg>

<div id="vignette"></div>
<div id="damage-flash"></div>
<div id="spell-overlay">
  <button class="overlay-close" onclick="try{SpellSystem.hide()}catch(e){}" style="z-index:110;">✕ CERRAR GRIMORIO</button>
  <canvas id="spell-canvas"></canvas>
</div>

<!-- JUMPSCARE OVERLAYS -->
<div id="jumpscare-overlay"><canvas id="jumpscare-canvas"></canvas></div>
<div id="subliminal-flash"><canvas id="subliminal-canvas"></canvas></div>
<div id="vhs-glitch"><canvas id="glitch-canvas"></canvas></div>
<div id="static-overlay"></div>
<canvas id="door-peek"></canvas>
<div id="creepy-text"></div>

<!-- Blood Drips -->
<div class="blood-drip" style="left: 12%; animation-delay: 0s;"></div>
<div class="blood-drip" style="left: 35%; animation-delay: 1.5s;"></div>
<div class="blood-drip" style="left: 58%; animation-delay: 0.8s;"></div>
<div class="blood-drip" style="left: 78%; animation-delay: 2.2s;"></div>
<div class="blood-drip" style="left: 92%; animation-delay: 3s;"></div>

<!-- Horror Ambient Music -->
<audio id="horror-music" loop preload="auto">
  <source src="audio/horror_ambient.mp3" type="audio/mpeg">
</audio>

<button id="voice-toggle" onclick="toggleVoice()">🗣 VOZ</button>
<button id="audio-toggle" onclick="toggleAudio()">♪ SONIDO</button>

<!-- GAME CONTAINER -->
<div id="game">

  <!-- TITLE SCREEN -->
  <div id="title-screen">
    <div style="margin-bottom: 20px; opacity: 0.3; font-size: 3rem; color: var(--blood);">⛧</div>
    <h1>El Grimorio<br>de Belphegor</h1>
    <p class="subtitle">— Un Juego de Ouija Maldita —</p>
    <div style="margin: 30px 0; opacity: 0.15; letter-spacing: 12px; font-size: 0.7rem; color: var(--blood);">
      A B C D E F G H I J K L M<br>
      N O P Q R S T U V W X Y Z<br><br>
      1 2 3 4 5 6 7 8 9 0
    </div>
    <button id="start-btn" onclick="startGame()">⛧ ABRIR EL GRIMORIO ⛧</button>
    <button id="perspective-btn" onclick="try{PerspectiveEngine.showSelectionScreen()}catch(e){}" style="background:transparent;border:1px solid rgba(201,168,76,0.3);color:rgba(201,168,76,0.6);font-family:'Cinzel',serif;font-size:0.7rem;padding:8px 20px;cursor:pointer;letter-spacing:3px;margin-top:15px;transition:all 0.3s ease;">👁️ PERSPECTIVA</button>
    <p style="margin-top: 20px; font-size: 0.65rem; opacity: 0.3; letter-spacing: 2px;">
      ADIÓS · GOODBYE · VALE
    </p>
  </div>

  <!-- GAME BOARD -->
  <div id="ouija-frame">
    <div class="ouija-corner tl"></div>
    <div class="ouija-corner tr"></div>
    <div class="ouija-corner bl"></div>
    <div class="ouija-corner br"></div>
    <div class="ouija-sun">☉</div>
    <div class="ouija-moon">☽</div>

    <div id="status-bar">
      <div class="soul-container">
        <span class="soul-label">Alma</span>
        <div class="soul-bar">
          <div class="soul-fill" id="soul-fill" style="width: 100%"></div>
        </div>
        <span class="soul-value" id="soul-value">100</span>
      </div>
      <span id="chapter-name"></span>
    </div>

    <div id="inventory-section">
      <div class="inv-label">Inventario</div>
      <div id="inventory"></div>
    </div>

    <div id="scene-illustration"></div>
    <div id="narrative"></div>
    <div id="choices"></div>
  </div>
</div>

<!-- ====== RPG HUD BAR ====== -->
<div id="hud-bar">
  <div id="clock-widget">
    <canvas id="clock-canvas" width="36" height="36"></canvas>
    <span id="clock-time">1:00</span>
  </div>
  <button class="hud-btn" onclick="MapEngine.toggle()"><span class="hud-icon">🗺️</span> Mapa</button>
  <button class="hud-btn" onclick="StatsUI.toggle()"><span class="hud-icon">📜</span> Alma</button>
  <button class="hud-btn" onclick="InventorySystem.toggle()"><span class="hud-icon">🎒</span> Objetos</button>
  <button class="hud-btn" onclick="SpellSystem.toggle()"><span class="hud-icon">🔮</span> Hechizos</button>
</div>

<!-- ====== OVERLAY PANELS ====== -->
<div id="map-overlay" class="overlay-panel">
  <button class="overlay-close" onclick="MapEngine.hide()">✕ CERRAR</button>
  <canvas id="map-canvas"></canvas>
</div>

<div id="stats-overlay" class="overlay-panel">
  <button class="overlay-close" onclick="StatsUI.hide()">✕ CERRAR</button>
  <canvas id="stats-canvas"></canvas>
</div>

<div id="inventory-overlay" class="overlay-panel">
  <button class="overlay-close" onclick="InventorySystem.hide()">✕ CERRAR</button>
  <div id="inventory-panel"></div>
</div>

<div id="combat-overlay" class="overlay-panel" style="z-index:450;">
  <button class="overlay-close" onclick="try{CombatEngine.end(false)}catch(e){}">✕ HUIR</button>
  <canvas id="combat-canvas"></canvas>
</div>

<!-- ====== ENGINE SCRIPTS (load order matters) ====== -->

<!-- 0. Error Diagnostics (must be VERY first) -->
<script>
window.onerror = function(msg, src, line, col, err) {
  document.title = 'ERROR: ' + msg;
  var d = document.createElement('div');
  d.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;background:#200;color:#f88;padding:10px;font:12px monospace;white-space:pre-wrap;max-height:40vh;overflow:auto;';
  d.textContent = 'ERROR linea ' + line + ' en ' + (src||'?') + ':\n' + msg + '\n' + (err && err.stack ? err.stack : '');
  document.body.appendChild(d);
};
</script>

<!-- 1. Core: Event Bus (must be first) -->
<script src="js/game-bus-global.js?v=2"></script>

<!-- 2. Audio Engines -->
<script src="js/engines/audio.js?v=2"></script>
<script src="js/engines/sound-design.js?v=2"></script>

<!-- 3. Visual Engines -->
<script src="js/engines/particles.js?v=2"></script>
<script src="js/engines/dynamic-bg.js?v=2"></script>
<script src="js/engines/media-engine.js?v=2"></script>
<script src="js/engines/cursed-cursor.js?v=2"></script>
<script src="js/engines/jumpscare.js?v=2"></script>

<!-- 4. Narrative Engines -->
<script src="js/engines/macabre-voice.js?v=2"></script>
<script src="js/engines/demon-whispers.js?v=2"></script>
<script src="js/engines/narrative-ai.js?v=2"></script>

<!-- 5. Persistence & NG+ -->
<script src="js/engines/persistence-legacy.js?v=2"></script>
<script src="js/engines/new-game-plus.js?v=2"></script>

<!-- 6. v2 Enhancement Engines -->
<script src="js/engines/text-corruption.js?v=2"></script>
<script src="js/engines/heartbeat-sync.js?v=2"></script>
<script src="js/engines/name-trap.js?v=2"></script>
<script src="js/engines/cruelty-gate.js?v=2"></script>
<script src="js/engines/inherited-objects.js?v=2"></script>
<script src="js/engines/cursed-guide.js?v=2"></script>
<script src="js/engines/perception-attack.js?v=2"></script>

<!-- 6b. Phase 2 RPG Systems -->
<script src="js/engines/map-engine.js?v=2"></script>
<script src="js/engines/stats-ui.js?v=2"></script>
<script src="js/engines/inventory-system.js?v=2"></script>
<script src="js/engines/clock-engine.js?v=2"></script>

<!-- 6c. Phase 3 Interaction Systems -->
<script src="js/engines/combat-engine.js?v=2"></script>
<script src="js/engines/spell-system.js?v=2"></script>
<script src="js/engines/belphegor-ai.js?v=2"></script>

<!-- 6d. Phase 4 Content Systems -->
<script src="js/engines/perspective-engine.js?v=2"></script>
<script src="js/engines/death-oracle.js?v=2"></script>

<!-- 6e. Phase 5 Polish -->
<script src="js/engines/art-engine.js?v=2"></script>
<script src="js/engines/sound-director.js?v=2"></script>

<!-- 7. Data -->
<script src="js/data/lore.js?v=2"></script>
<script src="js/data/scenes.js?v=2"></script>

<!-- 8. Legacy Game State & Functions -->
<script src="js/engines/game-state-legacy.js?v=2"></script>
<script src="js/engines/typewriter.js?v=2"></script>
<script src="js/game-legacy.js?v=2"></script>

<!-- 9. Event Wiring (must be last) -->
<script src="js/init.js?v=2"></script>

</body>
</html>
